name: Build OBS Football Plugin

on:
  push:
    branches:
      - main
      - develop
      - fix/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifactName: obs-football-plugin-linux
            generator: Ninja
            config: Release
            allowFailure: false
          - os: windows-2022
            artifactName: obs-football-plugin-windows
            generator: "Visual Studio 17 2022"
            config: Release
            allowFailure: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allowFailure }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            git \
            curl \
            libcurl4-openssl-dev \
            nlohmann-json3-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxinerama-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            uthash-dev \
            libasound2-dev \
            libpulse-dev \
            libv4l-dev \
            libudev-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            libjansson-dev \
            libmbedtls-dev \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev

      - name: Setup OBS SDK 30.2.2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch 30.2.2 https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-studio"

          cmake -S "$RUNNER_TEMP/obs-studio" -B "$RUNNER_TEMP/obs-build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/obs-sdk" \
            -DENABLE_UI=OFF \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_BROWSER=OFF \
            -DENABLE_PIPEWIRE=OFF \
            -DENABLE_PULSEAUDIO=ON

          cmake --build "$RUNNER_TEMP/obs-build" --parallel
          cmake --install "$RUNNER_TEMP/obs-build" --prefix "$RUNNER_TEMP/obs-sdk"

      - name: Setup OBS SDK 30.2.2 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/obsproject/obs-deps/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^windows-deps-.*-x64\.zip$' -and $_.name -notmatch 'qt6' } | Select-Object -First 1
          if (-not $asset) {
            throw "Unable to locate windows-deps x64 asset from obsproject/obs-deps latest release."
          }

          $obsDepsZip = "$env:RUNNER_TEMP/obs-deps.zip"
          $obsDepsDir = "$env:RUNNER_TEMP/obs-deps"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $obsDepsZip
          Expand-Archive -Path $obsDepsZip -DestinationPath $obsDepsDir -Force
          $depsRoot = Get-ChildItem -Path $obsDepsDir -Directory | Select-Object -First 1
          if (-not $depsRoot) {
            throw "obs-deps archive extracted without a root directory."
          }

          "OBS_DEPS_ROOT=$($depsRoot.FullName)" >> $env:GITHUB_ENV

          git clone --depth 1 --branch 30.2.2 https://github.com/obsproject/obs-studio.git "$env:RUNNER_TEMP/obs-studio"

          cmake -S "$env:RUNNER_TEMP/obs-studio" -B "$env:RUNNER_TEMP/obs-build" `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/obs-sdk" `
            -DCMAKE_PREFIX_PATH="$($depsRoot.FullName);$($depsRoot.FullName)\\bin" `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_UI=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_BROWSER=OFF

          cmake --build "$env:RUNNER_TEMP/obs-build" --target obs-frontend-api --config Release --parallel
          cmake --install "$env:RUNNER_TEMP/obs-build" --config Release --component Development

      - name: Configure plugin (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/obs-sdk"

      - name: Configure plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "${{ matrix.generator }}" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/obs-sdk;$env:OBS_DEPS_ROOT;$env:OBS_DEPS_ROOT\\bin"

      - name: Build plugin (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --parallel

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            build/**/*.so
            build/**/*.dll
            build/**/obs-football-plugin*
          if-no-files-found: warn
