name: Build OBS Football Plugin

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.*'
          arch: win64_msvc2019_64

      - name: Fetch OBS Studio headers
        run: |
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-studio/archive/refs/tags/30.2.2.zip" -OutFile obs.zip
          Expand-Archive obs.zip -DestinationPath obs-src
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-football-plugin-windows
          path: build/Release/*.dll

  build-linux:
    name: Build (Ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libobs-dev qt6-base-dev libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-football-plugin-linux
          path: build/*.so
