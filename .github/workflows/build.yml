name: Build OBS Football Plugin

on:
  push:
    branches: [main, develop, fix/**]
  pull_request:
    branches: [main, develop]

jobs:
  build-linux:
    name: Build Linux (CMake + Qt6)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          cache: true

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update

          base_packages=(
            cmake
            ninja-build
            build-essential
            pkg-config
            libcurl4-openssl-dev
            qt6-base-dev
            qt6-tools-dev
          )

          obs_packages=()
          for pkg in libobs-dev obs-studio-dev; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              obs_packages+=("$pkg")
            fi
          done

          if [ "${#obs_packages[@]}" -eq 0 ]; then
            echo "No OBS development packages found (libobs-dev/obs-studio-dev)."
            echo "Install OBS dev packages in the runner image or add a setup action for OBS SDK."
            exit 1
          fi

          sudo apt-get install -y "${base_packages[@]}" "${obs_packages[@]}"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-football-plugin-linux
          path: |
            build/**/*.so
            build/**/obs-football-plugin*
          if-no-files-found: warn
